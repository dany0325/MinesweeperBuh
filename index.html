<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MINESWEEPER.EXE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c08; --panel: #0b160b; --border: #1a4a1a;
      --green: #00ff41; --green-dim: #00aa2a; --green-dark: #021502;
      --red: #ff3333; --cell-size: 34px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px; position: relative; overflow: hidden;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px,
        rgba(0,0,0,0.13) 2px, rgba(0,0,0,0.13) 4px);
      pointer-events: none; z-index: 999;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(0,30,0,0.25) 0%, rgba(0,0,0,0.65) 100%);
      pointer-events: none; z-index: 0;
    }
    .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    h1 { font-family: 'VT323', monospace; font-size: 52px; color: var(--green);
         text-shadow: 0 0 10px var(--green), 0 0 30px rgba(0,255,65,0.4); letter-spacing: 8px; }
    .subtitle { font-size: 10px; color: var(--green-dim); letter-spacing: 4px; opacity: 0.7; }
    .difficulty { display: flex; gap: 3px; }
    .diff-btn {
      background: var(--green-dark); border: 1px solid #1a3a1a; color: #005518;
      font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px;
      padding: 5px 16px; cursor: pointer; transition: all 0.12s; text-transform: uppercase; outline: none;
    }
    .diff-btn:hover { border-color: var(--green-dim); color: var(--green-dim); }
    .diff-btn.active { background: #062b0a; border-color: var(--green); color: var(--green);
      text-shadow: 0 0 8px rgba(0,255,65,0.6); box-shadow: 0 0 8px rgba(0,255,65,0.2); }
    .game-panel { background: var(--panel); border: 2px solid #1a3a1a; padding: 14px; }
    .hud { display: flex; justify-content: space-between; align-items: center;
           margin-bottom: 10px; padding: 6px 10px; background: #040904; border: 1px solid #152015; }
    .hud-display { font-family: 'VT323', monospace; font-size: 38px; color: var(--red);
      text-shadow: 0 0 12px rgba(255,50,50,0.6); min-width: 72px; text-align: center; letter-spacing: 2px; }
    .new-game-btn {
      background: #041004; border: 2px solid #1a4a1a; color: var(--green-dim);
      font-size: 20px; width: 42px; height: 42px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.1s; outline: none;
    }
    .new-game-btn:hover { background: #062b0a; border-color: var(--green); color: var(--green); }
    #board { display: grid; gap: 2px; background: #000; border: 1px solid #152015; }
    .cell {
      width: var(--cell-size); height: var(--cell-size);
      background: #0b1a0b; border: 1px solid #152015;
      display: flex; align-items: center; justify-content: center;
      font-family: 'VT323', monospace; font-size: 20px; cursor: pointer; user-select: none;
      transition: background 0.06s;
    }
    .cell:hover:not(.revealed):not(.flagged) { background: #112611; border-color: #2a5a2a; }
    .cell.revealed  { background: #030803; border-color: #0a100a; cursor: default; }
    .cell.flagged   { background: #120800; border-color: #2a1500; color: #ff8800; text-shadow: 0 0 8px rgba(255,136,0,0.8); }
    .cell.mine-hit  { background: #2a0000 !important; border-color: var(--red) !important; color: var(--red); }
    .cell.mine-show { background: #120303; color: #cc2222; }
    .cell.wrong-flag { color: var(--red); }
    .n1 { color: #33ff88; text-shadow: 0 0 8px rgba(51,255,136,0.7); }
    .n2 { color: #33ccff; text-shadow: 0 0 8px rgba(51,204,255,0.7); }
    .n3 { color: #ff4444; text-shadow: 0 0 8px rgba(255,68,68,0.7);  }
    .n4 { color: #aa44ff; text-shadow: 0 0 8px rgba(170,68,255,0.7); }
    .n5 { color: #ff8833; text-shadow: 0 0 8px rgba(255,136,51,0.7); }
    .n6 { color: #33ffee; text-shadow: 0 0 8px rgba(51,255,238,0.7); }
    .n7 { color: #ff44cc; text-shadow: 0 0 8px rgba(255,68,204,0.7); }
    .n8 { color: #888888; text-shadow: 0 0 8px rgba(136,136,136,0.5);}
    .status-bar { margin-top: 8px; font-size: 10px; color: var(--green-dim);
      letter-spacing: 2px; text-align: center; min-height: 14px; }
    .status-bar.win  { color: var(--green); text-shadow: 0 0 10px var(--green); animation: blink 0.9s infinite; }
    .status-bar.lose { color: var(--red);   text-shadow: 0 0 10px var(--red); }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-block">
      <h1>MINESWEEPER</h1>
      <div class="subtitle">// TERMINAL EDITION v1.0 //</div>
    </div>
    <div class="difficulty">
      <button class="diff-btn active" data-diff="easy">EASY</button>
      <button class="diff-btn" data-diff="medium">MEDIUM</button>
      <button class="diff-btn" data-diff="hard">HARD</button>
    </div>
    <div class="game-panel">
      <div class="hud">
        <div class="hud-display" id="mine-counter">010</div>
        <button class="new-game-btn" id="new-game">&#9672;</button>
        <div class="hud-display" id="timer-display">000</div>
      </div>
      <div id="board"></div>
    </div>
    <div class="status-bar" id="status">RIGHT-CLICK TO FLAG · LEFT-CLICK TO REVEAL · DBL-CLICK TO CHORD</div>
  </div>
</body>
</html>
<script>
"use strict";
const DIFF = {
  easy:   { rows:  9, cols:  9, mines: 10 },
  medium: { rows: 16, cols: 16, mines: 40 },
  hard:   { rows: 16, cols: 30, mines: 99 },
};
let cfg = DIFF.easy, board = [], gameState = 'idle', firstClick = true;
let minesLeft = 0, elapsed = 0, timerID = null;

const boardEl   = document.getElementById('board');
const timerEl   = document.getElementById('timer-display');
const counterEl = document.getElementById('mine-counter');
const statusEl  = document.getElementById('status');
const newGameBtn = document.getElementById('new-game');

const pad    = n => String(Math.min(Math.max(n,-99),999)).padStart(3,'0');
const cellAt = (r, c) => boardEl.children[r * cfg.cols + c];

function eachNeighbor(r, c, fn) {
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r+dr, nc = c+dc;
      if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols) fn(nr, nc);
    }
}

function initBoard() {
  clearInterval(timerID);
  elapsed = 0; firstClick = true; gameState = 'idle'; minesLeft = cfg.mines;
  timerEl.textContent = '000'; counterEl.textContent = pad(minesLeft);
  newGameBtn.textContent = '◈';
  board = Array.from({ length: cfg.rows }, (_, r) =>
    Array.from({ length: cfg.cols }, (_, c) =>
      ({ r, c, mine: false, flagged: false, revealed: false, number: 0 }))
  );
  renderBoard();
}

function placeMines(safeR, safeC) {
  let placed = 0;
  while (placed < cfg.mines) {
    const r = Math.floor(Math.random() * cfg.rows);
    const c = Math.floor(Math.random() * cfg.cols);
    if (board[r][c].mine) continue;
    if (Math.abs(r-safeR) <= 1 && Math.abs(c-safeC) <= 1) continue;
    board[r][c].mine = true; placed++;
  }
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++) {
      if (board[r][c].mine) continue;
      let n = 0; eachNeighbor(r, c, (nr,nc) => { if (board[nr][nc].mine) n++; });
      board[r][c].number = n;
    }
}

function renderBoard() {
  boardEl.style.gridTemplateColumns = `repeat(${cfg.cols}, var(--cell-size))`;
  boardEl.innerHTML = '';
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++) {
      const el = document.createElement('div');
      el.className = 'cell';
      el.addEventListener('click', () => onLeftClick(r, c));
      el.addEventListener('contextmenu', e => { e.preventDefault(); onRightClick(r, c); });
      boardEl.appendChild(el);
    }
}

function onLeftClick(r, c) {
  if (gameState === 'won' || gameState === 'lost') return;
  if (firstClick) {
    firstClick = false; gameState = 'playing'; placeMines(r, c);
    timerID = setInterval(() => { elapsed++; timerEl.textContent = pad(Math.min(elapsed,999)); }, 1000);
  }
}

function onRightClick(r, c) { /* flagging — next commit */ }

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); cfg = DIFF[btn.dataset.diff]; initBoard();
  });
});
newGameBtn.addEventListener('click', initBoard);
initBoard();
</script>
